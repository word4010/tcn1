<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ТСН-Новини ULTRA</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f5f5f5;
            color: #111
        }

        header {
            background: #c40000;
            color: #fff;
            padding: 15px;
            font-size: 30px;
            font-weight: bold;
            text-align: center
        }

        .container {
            max-width: 1100px;
            margin: auto;
            padding: 20px
        }

        .filters {
            margin: 15px 0
        }

        .filters button {
            margin-right: 10px
        }

        .news {
            background: #fff;
            border-radius: 8px;
            margin-bottom: 15px;
            padding: 15px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            position: relative
        }

        .news h2 {
            margin: 0 0 10px
        }

        .news small {
            color: gray
        }

        button {
            background: #c40000;
            color: #fff;
            border: none;
            padding: 8px 12px;
            cursor: pointer;
            border-radius: 5px
        }

        .like {
            margin-top: 10px;
            cursor: pointer;
            color: #c40000
        }

        .delete {
            position: absolute;
            top: 10px;
            right: 10px;
            cursor: pointer;
            color: red;
            font-size: 14px
        }

        #editor {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000cc;
            align-items: center;
            justify-content: center
        }

        #editorBox {
            background: #fff;
            padding: 20px;
            width: 320px;
            border-radius: 10px;
            position: relative
        }

        #editorBox input,
        #editorBox textarea,
        #editorBox select {
            width: 100%;
            margin: 5px 0;
            padding: 8px
        }

        .close-editor {
            position: absolute;
            top: 5px;
            right: 10px;
            cursor: pointer;
            font-weight: bold;
            color: #c40000
        }
    </style>
</head>

<body>

    <header>ТСН-Новини ULTRA</header>

    <div class="container">
        <button onclick="openEditor()">+ Додати новину</button>
        <div class="filters">
            <button onclick="filterNews('all')">Всі</button>
            <button onclick="filterNews('Політика')">Політика</button>
            <button onclick="filterNews('Ігри')">Ігри</button>
            <button onclick="filterNews('Світ')">Світ</button>
        </div>
        <div id="newsList"></div>
    </div>

    <div id="editor" onclick="closeEditor(event)">
        <div id="editorBox">
            <div class="close-editor" onclick="logout()">×</div>
            <h3>Вхід редактора</h3>
            <input type="password" id="pass" placeholder="Пароль">
            <button onclick="checkPass()">Увійти</button>

            <div id="editPanel" style="display:none">
                <h3>Нова новина</h3>
                <input id="title" placeholder="Заголовок">
                <input type="file" id="file" multiple>
                <select id="cat">
                    <option>Політика</option>
                    <option>Ігри</option>
                    <option>Світ</option>
                </select>
                <textarea id="text" placeholder="Текст"></textarea>
                <button onclick="addNews()">Опублікувати</button>
            </div>
        </div>
    </div>

    <script>
        const PASSWORD = "ua2026";
        let currentFilter = 'all';
        let isAuth = false;

        function getNews() { return JSON.parse(localStorage.getItem('news') || "[]"); }
        function saveNews(arr) { localStorage.setItem('news', JSON.stringify(arr)); }

        function render() {
            let list = document.getElementById('newsList');
            list.innerHTML = '';
            getNews().forEach((n, i) => {
                if (currentFilter !== 'all' && n.cat !== currentFilter) return;
                let div = document.createElement('div');
                div.className = 'news';
                let filesHTML = '';
                if (n.files && n.files.length > 0) {
                    n.files.forEach((f, index) => {
                        filesHTML += `<div><a href="${f.data}" download="${f.name}">📎 ${f.name}</a></div>`;
                    });
                }
                div.innerHTML = `
            ${isAuth ? `<div class="delete" onclick="deleteNews(${i})">✖</div>` : ''}
            <h2>${n.t}</h2>
            <small>${n.cat} | ${n.d}</small>
            <p>${n.c}</p>
            ${filesHTML}
            <div class="like" onclick="like(${i})">❤️ ${n.likes}</div>
        `;
                list.append(div);
            });
        }

        function openEditor() { document.getElementById('editor').style.display = 'flex'; }
        function closeEditor(e) { if (e.target.id === 'editor') document.getElementById('editor').style.display = 'none'; }
        function filterNews(cat) { currentFilter = cat; render(); }

        function checkPass() {
            let input = document.getElementById('pass').value;
            if (input === PASSWORD) {
                document.getElementById('editPanel').style.display = 'block';
                isAuth = true;
                render();
            } else alert('Невірний пароль');
        }

        function logout() {
            isAuth = false;
            document.getElementById('editPanel').style.display = 'none';
            document.getElementById('editor').style.display = 'none';
            render();
        }

        function addNews() {
            let title = document.getElementById('title').value;
            let text = document.getElementById('text').value;
            let fileInput = document.getElementById('file');
            let category = document.getElementById('cat').value;
            if (!title || !text) return alert('Заповни все');

            let files = [];
            if (fileInput.files.length > 0) {
                let loaded = 0;
                for (let i = 0; i < fileInput.files.length; i++) {
                    let reader = new FileReader();
                    reader.onload = function (e) {
                        files.push({ name: fileInput.files[i].name, data: e.target.result });
                        loaded++;
                        if (loaded === fileInput.files.length) {
                            saveNewItem();
                        }
                    }
                    reader.readAsDataURL(fileInput.files[i]);
                }
            } else saveNewItem();

            function saveNewItem() {
                let newsArr = getNews();
                newsArr.unshift({
                    t: title,
                    c: text,
                    cat: category,
                    d: new Date().toLocaleString(),
                    likes: 0,
                    files: files
                });
                saveNews(newsArr);
                render();
                document.getElementById('title').value = '';
                document.getElementById('text').value = '';
                document.getElementById('file').value = '';
            }
        }

        function like(i) {
            let newsArr = getNews();
            newsArr[i].likes++;
            saveNews(newsArr);
            render();
        }

        function deleteNews(i) {
            if (!isAuth) return alert('Нема доступу');
            let newsArr = getNews();
            newsArr.splice(i, 1);
            saveNews(newsArr);
            render();
        }

        render();
    </script>

</body>

</html>
