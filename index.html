<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ТСН-Новини PRO</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f5f5f5;
            color: #111
        }

        header {
            background: #c40000;
            color: #fff;
            padding: 15px;
            font-size: 30px;
            font-weight: bold;
            text-align: center
        }

        .container {
            max-width: 1100px;
            margin: auto;
            padding: 20px
        }

        .filters {
            margin: 15px 0
        }

        .filters button {
            margin-right: 10px
        }

        .news {
            background: #fff;
            border-radius: 8px;
            margin-bottom: 15px;
            padding: 15px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            position: relative
        }

        .news img {
            width: 100%;
            border-radius: 6px;
            margin-bottom: 10px
        }

        .news h2 {
            margin: 0 0 10px
        }

        .news small {
            color: gray
        }

        button {
            background: #c40000;
            color: #fff;
            border: none;
            padding: 8px 12px;
            cursor: pointer;
            border-radius: 5px
        }

        .like {
            margin-top: 10px;
            cursor: pointer;
            color: #c40000
        }

        .delete {
            position: absolute;
            top: 10px;
            right: 10px;
            cursor: pointer;
            color: red;
            font-size: 14px
        }

        #editor {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000cc;
            align-items: center;
            justify-content: center
        }

        #editorBox {
            background: #fff;
            padding: 20px;
            width: 320px;
            border-radius: 10px;
            position: relative
        }

        #editorBox input,
        #editorBox textarea,
        #editorBox select {
            width: 100%;
            margin: 5px 0;
            padding: 8px
        }

        .close-editor {
            position: absolute;
            top: 5px;
            right: 10px;
            cursor: pointer;
            font-weight: bold;
            color: #c40000
        }
    </style>
</head>

<body>

    <header>ТСН-Новини PRO</header>

    <div class="container">
        <button onclick="openEditor()">+ Додати новину</button>
        <div class="filters">
            <button onclick="filterNews('all')">Всі</button>
            <button onclick="filterNews('Політика')">Політика</button>
            <button onclick="filterNews('Ігри')">Ігри</button>
            <button onclick="filterNews('Світ')">Світ</button>
        </div>
        <div id="newsList"></div>
    </div>

    <div id="editor" onclick="closeEditor(event)">
        <div id="editorBox">
            <div class="close-editor" onclick="logout()">×</div>
            <h3>Вхід редактора</h3>
            <input type="password" id="pass" placeholder="Пароль">
            <button onclick="checkPass()">Увійти</button>

            <div id="editPanel" style="display:none">
                <h3>Нова новина</h3>
                <input id="title" placeholder="Заголовок">
                <input type="file" id="file">
                <select id="cat">
                    <option>Політика</option>
                    <option>Ігри</option>
                    <option>Світ</option>
                </select>
                <textarea id="text" placeholder="Текст"></textarea>
                <button onclick="addNews()">Опублікувати</button>
            </div>
        </div>
    </div>

    <script>
        const PASSWORD = "ua2026";
        let currentFilter = 'all';
        let isAuth = false;

        async function fetchNews() {
            let res = await fetch('news.json');
            return await res.json();
        }

        async function saveNews(arr) {
            await fetch('saveNews', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(arr)
            });
        }

        async function render() {
            let list = document.getElementById('newsList');
            list.innerHTML = '';
            let newsArr = await fetchNews();
            newsArr.forEach((n, i) => {
                if (currentFilter !== 'all' && n.cat !== currentFilter) return;
                let div = document.createElement('div');
                div.className = 'news';
                div.innerHTML = `
            ${isAuth ? `<div class="delete" onclick="deleteNews(${i})">✖</div>` : ''}
            ${n.i ? `<img src="${n.i}">` : ''}
            <h2>${n.t}</h2>
            <small>${n.cat} | ${n.d}</small>
            <p>${n.c}</p>
            <div class="like" onclick="like(${i})">❤️ ${n.likes}</div>
        `;
                list.append(div);
            });
        }

        function openEditor() { document.getElementById('editor').style.display = 'flex' }
        function closeEditor(e) { if (e.target.id === 'editor') document.getElementById('editor').style.display = 'none' }
        function filterNews(cat) { currentFilter = cat; render(); }

        function checkPass() {
            let input = document.getElementById('pass').value;
            if (input === PASSWORD) {
                document.getElementById('editPanel').style.display = 'block';
                isAuth = true;
                render();
            } else alert('Невірний пароль');
        }

        function logout() {
            isAuth = false;
            document.getElementById('editPanel').style.display = 'none';
            document.getElementById('editor').style.display = 'none';
            render();
        }

        async function addNews() {
            let title = document.getElementById('title').value;
            let text = document.getElementById('text').value;
            let fileInput = document.getElementById('file');
            let category = document.getElementById('cat').value;
            if (!title || !text) return alert('Заповни все');

            let reader = new FileReader();
            reader.onload = async function () {
                let n = { t: title, c: text, i: reader.result, cat: category, d: new Date().toLocaleString(), likes: 0 };
                let newsArr = await fetchNews();
                newsArr.unshift(n);
                await saveNews(newsArr);
                render();
                document.getElementById('title').value = '';
                document.getElementById('text').value = '';
                document.getElementById('file').value = '';
            }
            if (fileInput.files[0]) reader.readAsDataURL(fileInput.files[0]);
            else reader.onload();
        }

        async function like(i) {
            let newsArr = await fetchNews();
            newsArr[i].likes++;
            await saveNews(newsArr);
            render();
        }

        async function deleteNews(i) {
            if (!isAuth) return alert('Нема доступу');
            let newsArr = await fetchNews();
            newsArr.splice(i, 1);
            await saveNews(newsArr);
            render();
        }

        render();
    </script>
</body>

</html>
